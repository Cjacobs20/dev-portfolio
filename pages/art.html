<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fine Art — Chris Jacobs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../images/favicon2.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      :root {
        --corridor-depth: 2900px;
        --corridor-width: 2000px;
        --wall-overlap: 50px;
        --wall-height: 2000px;
        --camera-start: 700px;
        --camera-max: 3600px;
        --artwork-wall-offset: 990px;
        --corridor-start: 600px;
        --corridor-end: 2700px;
      }

      body {
        overflow: hidden;
        background: #000 !important;
        cursor: none;
      }

      body:has(a:hover) .cursor-ring,
      body:has(button:hover) .cursor-ring {
        width: 36px;
        height: 36px;
        opacity: 0.45;
      }

      .gallery-hud {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 40px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        pointer-events: none;
      }
      .gallery-hud a, .gallery-hud button { pointer-events: all; }
      .hud-back {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: rgba(255,255,255,0.5);
        text-decoration: none;
        letter-spacing: 0.1em;
        transition: color 0.2s;
        cursor: none;
      }
      .hud-back:hover { color: var(--accent); }
      .hud-title {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: rgba(255,255,255,0.3);
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .hud-hint {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: rgba(255,255,255,0.25);
        letter-spacing: 0.08em;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .hud-hint-icon {
        width: 20px; height: 28px;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 10px;
        position: relative;
        display: inline-block;
      }
      .hud-hint-icon::after {
        content: "";
        position: absolute;
        width: 4px; height: 6px;
        background: rgba(255,255,255,0.4);
        border-radius: 2px;
        top: 4px; left: 50%;
        transform: translateX(-50%);
        animation: scroll-hint 1.5s ease-in-out infinite;
      }
      @keyframes scroll-hint {
        0%,100% { opacity: 1; top: 4px; }
        50%     { opacity: 0; top: 12px; }
      }

      .gallery-progress {
        position: fixed;
        bottom: 0; left: 0;
        height: 2px;
        background: var(--accent);
        z-index: 100;
        transition: width 0.1s ease;
        box-shadow: 0 0 8px var(--accent);
      }

      .gallery-stage {
        position: fixed;
        inset: 0;
        perspective: 700px;
        perspective-origin: 50% 45%;
        background: #000;
      }
      .gallery-room {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        will-change: transform;
      }

      #artworkContainer {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
      }

      .room-floor {
        position: absolute;
        width: var(--corridor-width);
        height: calc(var(--corridor-depth) + var(--wall-overlap));
        left: 50%;
        bottom: 0;
        transform: translateX(-50%) rotateX(90deg);
        transform-origin: bottom center;
        background:
          repeating-linear-gradient(90deg,
            rgba(255,255,255,0.03) 0px,
            rgba(255,255,255,0.03) 1px,
            transparent 1px,
            transparent 120px),
          repeating-linear-gradient(0deg,
            rgba(255,255,255,0.03) 0px,
            rgba(255,255,255,0.03) 1px,
            transparent 1px,
            transparent 120px),
          #0a0a0a;
        transition: background 0.4s ease;
      }
      .room-ceiling {
        position: absolute;
        width: var(--corridor-width);
        height: calc(var(--corridor-depth) + var(--wall-overlap));
        left: 50%;
        top: 0;
        transform: translateX(-50%) rotateX(-90deg);
        transform-origin: top center;
        background: #161616;
        transition: background 0.4s ease;
      }
      .room-wall-left {
        position: absolute;
        width: calc(var(--corridor-depth) + var(--wall-overlap));
        height: var(--wall-height);
        top: 50%;
        right: calc(50% + 1px);
        margin-top: calc(var(--wall-height) / -2);
        transform-origin: right center;
        transform: rotateY(90deg);
        background: linear-gradient(to bottom, #2e2e2e 0%, #252525 55%, #1c1c1c 100%);
        transition: background 0.4s ease;
      }
      .room-wall-right {
        position: absolute;
        width: calc(var(--corridor-depth) + var(--wall-overlap));
        height: var(--wall-height);
        top: 50%;
        left: calc(50% + 1px);
        margin-top: calc(var(--wall-height) / -2);
        transform-origin: left center;
        transform: rotateY(-90deg);
        background: linear-gradient(to bottom, #2e2e2e 0%, #252525 55%, #1c1c1c 100%);
        transition: background 0.4s ease;
      }
      .room-wall-back {
        position: absolute;
        width: var(--corridor-width);
        height: var(--wall-height);
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) translateZ(calc(-1 * var(--corridor-depth)));
        background: linear-gradient(to bottom, #2e2e2e 0%, #252525 55%, #1c1c1c 100%);
        transition: background 0.4s ease;
      }

      :root[data-theme="light"] body            { background: #ede9e0 !important; }
      :root[data-theme="light"] .gallery-stage  { background: #ede9e0; }
      :root[data-theme="light"] .room-wall-left,
      :root[data-theme="light"] .room-wall-right,
      :root[data-theme="light"] .room-wall-back {
        background: linear-gradient(to bottom, #faf8f4 0%, #ede9e0 65%, #e0d9cd 100%);
      }
      :root[data-theme="light"] .room-floor {
        background:
          repeating-linear-gradient(90deg, rgba(255,180,80,0.05) 0px, rgba(255,180,80,0.05) 1px, transparent 1px, transparent 64px),
          #2a1a0e !important;
      }
      :root[data-theme="light"] .room-ceiling  { background: #fdfcfa !important; }

      :root[data-theme="dark"]  body            { background: #2e2e2e !important; }
      :root[data-theme="dark"]  .gallery-stage  { background: #2e2e2e; }

      :root[data-theme="alien"] body            { background: #163020 !important; }
      :root[data-theme="alien"] .gallery-stage  { background: #163020; }
      :root[data-theme="alien"] .room-wall-left,
      :root[data-theme="alien"] .room-wall-right,
      :root[data-theme="alien"] .room-wall-back {
        background: linear-gradient(to bottom, #163020 0%, #0d3019 60%, #07200f 100%);
      }
      :root[data-theme="alien"] .room-floor    { background: #061a0c !important; }
      :root[data-theme="alien"] .room-ceiling  { background: #0b1f10 !important; }

      .artwork {
        position: absolute;
        cursor: none;
        left: 50%; top: 50%;
        transform-style: preserve-3d;
      }
      .artwork-frame {
        position: relative;
        background: #1e1710;
        padding: 14px;
        box-shadow:
          inset 1px 1px 0 rgba(255,255,255,0.1),
          inset -1px -1px 0 rgba(0,0,0,0.6),
          4px 6px 0 rgba(0,0,0,0.5),
          7px 12px 0 rgba(0,0,0,0.25),
          0 24px 60px rgba(0,0,0,0.85);
        transition: box-shadow 0.3s ease;
        display: inline-block;
      }
      :root[data-theme="light"] .artwork-frame {
        background: #c8a870;
        box-shadow:
          inset 1px 1px 0 rgba(255,255,255,0.45),
          inset -1px -1px 0 rgba(0,0,0,0.22),
          4px 6px 0 rgba(0,0,0,0.28),
          7px 12px 0 rgba(0,0,0,0.13),
          0 0 80px rgba(255,215,100,0.38),
          0 24px 50px rgba(0,0,0,0.28);
      }
      .artwork-frame img {
        display: block;
        max-width: 360px;
        height: auto;
        width: auto;
      }
      .artwork.size-large  .artwork-frame img { max-width: 360px; }
      .artwork.size-medium .artwork-frame img { max-width: 260px; }
      .artwork.size-small  .artwork-frame img { max-width: 180px; }
      .artwork:hover .artwork-frame {
        box-shadow:
          inset 1px 1px 0 rgba(255,255,255,0.1),
          inset -1px -1px 0 rgba(0,0,0,0.6),
          4px 6px 0 rgba(0,0,0,0.5),
          7px 12px 0 rgba(0,0,0,0.25),
          0 0 0 1px rgba(255,255,255,0.15),
          0 0 60px rgba(255,255,255,0.1);
      }
      :root[data-theme="light"] .artwork:hover .artwork-frame {
        box-shadow:
          inset 1px 1px 0 rgba(255,255,255,0.45),
          inset -1px -1px 0 rgba(0,0,0,0.22),
          4px 6px 0 rgba(0,0,0,0.28),
          7px 12px 0 rgba(0,0,0,0.13),
          0 0 0 1px rgba(200,168,112,0.7),
          0 0 40px rgba(200,168,112,0.25);
      }


      .collection-label {
        position: absolute;
        left: 50%;
        top: 60px;
        transform: translate(-50%, 0) translateZ(calc(-1 * var(--corridor-depth) + 80px));
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: rgba(255,255,255,0.2);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .collection-piece {
        position: absolute;
        left: 50%; top: 50%;
        cursor: none;
        transform: translate(-50%, -50%)
                   translateZ(calc(-1 * var(--corridor-depth) + 60px))
                   translateX(var(--col-x));
      }
      .collection-piece.left   { --col-x: -380px; }
      .collection-piece.center { --col-x: 0px; }
      .collection-piece.right  { --col-x: 380px; }
      .collection-piece .artwork-frame { display: inline-block; }
      .collection-piece .artwork-frame img {
        display: block;
        max-width: 280px;
        width: auto;
        height: auto;
      }
      .collection-piece.center .artwork-frame img { max-width: 340px; }

      .gallery-lightbox {
        position: fixed;
        inset: 0;
        z-index: 500;
        background: rgba(0,0,0,0.96);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 60px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      .gallery-lightbox.open { opacity: 1; pointer-events: all; }
      .lb-img-wrap {
        max-height: 80vh;
        max-width: 60vw;
        display: flex;
        align-items: center;
      }
      .lb-img-wrap img {
        max-height: 80vh;
        max-width: 60vw;
        object-fit: contain;
        box-shadow: 0 40px 120px rgba(0,0,0,0.8);
      }
      .lb-info { width: 280px; flex-shrink: 0; }
      .lb-title {
        font-family: "DM Serif Display", serif;
        font-size: 32px;
        color: #fff;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
        line-height: 1.1;
      }
      .lb-year {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 0.14em;
        margin-bottom: 32px;
      }
      .lb-detail {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: rgba(255,255,255,0.4);
        letter-spacing: 0.08em;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex;
        justify-content: space-between;
      }
      .lb-detail:last-child { border-bottom: none; }
      .lb-detail-key {
        color: rgba(255,255,255,0.25);
        text-transform: uppercase;
      }
      .lb-close {
        position: fixed;
        top: 24px; right: 32px;
        font-size: 24px;
        color: rgba(255,255,255,0.4);
        background: none;
        border: none;
        cursor: none;
        transition: color 0.2s;
        z-index: 501;
      }
      .lb-close:hover { color: #fff; }

      /* ── GALLERY HUD THEME BUTTONS ── */
      .gallery-hud .theme-btn {
        opacity: 0.3;
        transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
      }
      .gallery-hud .theme-btn:hover {
        opacity: 0.7;
        transform: scale(1.25);
      }
      .gallery-hud .theme-btn.active {
        opacity: 1;
        transform: scale(1.45);
        border-color: transparent;
        box-shadow: 0 0 0 2px rgba(255,255,255,0.7), 0 0 10px rgba(255,255,255,0.2);
      }
      :root[data-theme="light"] .gallery-hud .theme-btn.active {
        box-shadow: 0 0 0 2px rgba(0,0,0,0.55), 0 0 8px rgba(0,0,0,0.12);
      }

      @media (max-width: 768px) {
        body { overflow: auto !important; }
        .gallery-stage { display: none; }
        .gallery-progress { display: none; }
        .hud-hint { display: none; }
        .mobile-fallback {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 100px 24px 60px;
          gap: 32px;
        }
      }
      @media (min-width: 769px) {
        .mobile-fallback { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <script>window.CJ_SECTION = "art";</script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/cursor.js"></script>

    <div class="gallery-hud">
      <a href="../index.html" class="hud-back">← Exit Gallery</a>
      <span class="hud-title">Fine Art &amp; Illustration</span>
      <div style="display: flex; align-items: center; gap: 6px;">
        <span style="font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); margin-right: 4px; letter-spacing: 0.08em;">theme</span>
        <button class="theme-btn" data-t="dark"  title="Dark"  aria-label="Dark"></button>
        <button class="theme-btn" data-t="light" title="Light" aria-label="Light"></button>
        <button class="theme-btn" data-t="alien" title="Alien" aria-label="Alien"></button>
      </div>
      <div class="hud-hint">
        <span class="hud-hint-icon"></span>
        scroll to walk
      </div>
    </div>

    <div class="gallery-progress" id="galleryProgress"></div>

    <div class="gallery-lightbox" id="lightbox">
      <button class="lb-close" id="lbClose">✕</button>
      <div class="lb-img-wrap"><img src="" alt="" id="lbImg" /></div>
      <div class="lb-info">
        <div class="lb-title" id="lbTitle"></div>
        <div class="lb-year" id="lbYear"></div>
        <div id="lbDetails"></div>
      </div>
    </div>

    <div class="gallery-stage">
      <div class="gallery-room" id="galleryRoom">
        <div class="room-floor"></div>
        <div class="room-ceiling"></div>
        <div class="room-wall-left"></div>
        <div class="room-wall-right"></div>
        <div id="artworkContainer"></div>
        <div class="room-wall-back" id="roomWallBack"></div>
        <div class="collection-label">The Collection</div>
      </div>
    </div>

    <div class="mobile-fallback" id="mobileFallback"></div>

    <script>
      const savedTheme = localStorage.getItem("cj-theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);

      const wallColors = {
        dark: {
          wall:    "linear-gradient(to bottom, #2e2e2e 0%, #252525 55%, #1c1c1c 100%)",
          floor:   "#0a0a0a",
          ceiling: "#161616",
        },
        light: {
          wall:    "linear-gradient(to bottom, #faf8f4 0%, #ede9e0 65%, #e0d9cd 100%)",
          floor:   "repeating-linear-gradient(90deg,rgba(255,180,80,0.05) 0px,rgba(255,180,80,0.05) 1px,transparent 1px,transparent 64px),#2a1a0e",
          ceiling: "#fdfcfa",
        },
        alien: {
          wall:    "linear-gradient(to bottom, #163020 0%, #0d3019 60%, #07200f 100%)",
          floor:   "#061a0c",
          ceiling: "#0b1f10",
        },
      };

      function applyRoomTheme(theme) {
        const c = wallColors[theme] || wallColors.dark;
        document.querySelectorAll(".room-wall-left, .room-wall-right, .room-wall-back")
          .forEach((el) => (el.style.background = c.wall));
        document.querySelectorAll(".room-floor")
          .forEach((el) => (el.style.background = c.floor));
        document.querySelectorAll(".room-ceiling")
          .forEach((el) => (el.style.background = c.ceiling));
      }
      applyRoomTheme(savedTheme);

      document.querySelectorAll(".theme-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.t === savedTheme);
        btn.addEventListener("click", () => {
          const t = btn.dataset.t;
          document.documentElement.setAttribute("data-theme", t);
          localStorage.setItem("cj-theme", t);
          document.querySelectorAll(".theme-btn")
            .forEach((b) => b.classList.toggle("active", b.dataset.t === t));
          applyRoomTheme(t);
        });
      });

      const cssRoot = getComputedStyle(document.documentElement);
      const CAMERA_START        = parseFloat(cssRoot.getPropertyValue("--camera-start"));
      const CAMERA_MAX          = parseFloat(cssRoot.getPropertyValue("--camera-max"));
      const CORRIDOR_START      = parseFloat(cssRoot.getPropertyValue("--corridor-start"));
      const CORRIDOR_END        = parseFloat(cssRoot.getPropertyValue("--corridor-end"));
      const ARTWORK_WALL_OFFSET = parseFloat(cssRoot.getPropertyValue("--artwork-wall-offset"));

      const room = document.getElementById("galleryRoom");
      const progress = document.getElementById("galleryProgress");
      let currentZ = CAMERA_START;
      let targetZ = CAMERA_START;

      fetch("../data/art.json")
        .then((r) => r.json())
        .then((data) => {
          buildGallery(data);
          buildMobileFallback(data);
        })
        .catch(() => console.warn("art.json not found"));

      function buildGallery(data) {
        const container = document.getElementById("artworkContainer");
        const pieces = data.corridor;
        const count = pieces.length;

        pieces.forEach((piece, i) => {
          const t = count > 1 ? i / (count - 1) : 0;
          const zPos = -(CORRIDOR_START + t * (CORRIDOR_END - CORRIDOR_START));
          const isLeft = piece.wall === "left";
          const xPos = isLeft ? -ARTWORK_WALL_OFFSET : ARTWORK_WALL_OFFSET;
          const rotY = isLeft ? -90 : 90;

          const el = document.createElement("div");
          el.className = `artwork size-${piece.size}`;
          el.style.cssText = `
            position: absolute;
            left: 50%; top: 50%;
            cursor: none;
            transform: translate(-50%, -50%)
                       translate3d(${xPos}px, 0px, ${zPos}px)
                       rotateY(${rotY}deg);
          `;
          el.innerHTML = `
            <div class="artwork-frame">
              <img src="../images/art/${piece.filename}" alt="${piece.title}"
                onerror="this.style.background='#1a1a1a';this.style.minWidth='200px';this.style.minHeight='200px'">
            </div>`;
          el.addEventListener("click", () => openLightbox(piece));
          container.appendChild(el);
        });

        const galleryRoom = document.getElementById("galleryRoom");
        data.collection.forEach((piece) => {
          const el = document.createElement("div");
          el.className = `collection-piece ${piece.position}`;
          el.innerHTML = `
            <div class="artwork-frame">
              <img src="../images/art/${piece.filename}" alt="${piece.title}"
                onerror="this.style.background='#1a1a1a';this.style.minWidth='200px';this.style.minHeight='200px'">
            </div>`;
          el.addEventListener("click", () => openLightbox(piece));
          galleryRoom.appendChild(el);
        });
      }

      window.addEventListener("wheel", (e) => {
        targetZ = Math.max(CAMERA_START, Math.min(CAMERA_MAX, targetZ - e.deltaY * 1.2));
        progress.style.width = ((targetZ - CAMERA_START) / (CAMERA_MAX - CAMERA_START) * 100) + "%";
      }, { passive: true });

      window.addEventListener("keydown", (e) => {
        const step = 120;
        if (e.key === "ArrowDown" || e.key === "ArrowRight")
          targetZ = Math.min(CAMERA_MAX, targetZ + step);
        if (e.key === "ArrowUp" || e.key === "ArrowLeft")
          targetZ = Math.max(CAMERA_START, targetZ - step);
        progress.style.width = ((targetZ - CAMERA_START) / (CAMERA_MAX - CAMERA_START) * 100) + "%";
      });

      (function cameraLoop() {
        currentZ += (targetZ - currentZ) * 0.08;
        room.style.transform = `translateZ(${currentZ}px)`;
        requestAnimationFrame(cameraLoop);
      })();

      const lightbox = document.getElementById("lightbox");

      function openLightbox(piece) {
        document.getElementById("lbImg").src = `../images/art/${piece.filename}`;
        document.getElementById("lbTitle").textContent = piece.title;
        document.getElementById("lbYear").textContent = piece.year;
        const details = [
          ["Medium", piece.medium],
          ["Dimensions", piece.dimensions],
        ].filter(([, v]) => v);
        document.getElementById("lbDetails").innerHTML = details
          .map(([k, v]) => `<div class="lb-detail"><span class="lb-detail-key">${k}</span><span>${v}</span></div>`)
          .join("");
        lightbox.classList.add("open");
      }

      document.getElementById("lbClose")
        .addEventListener("click", () => lightbox.classList.remove("open"));
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) lightbox.classList.remove("open");
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") lightbox.classList.remove("open");
      });

      function buildMobileFallback(data) {
        const el = document.getElementById("mobileFallback");
        [...data.corridor, ...data.collection].forEach((piece) => {
          el.innerHTML += `
            <div style="text-align:center;">
              <div class="artwork-frame" style="display:inline-block;">
                <img src="../images/art/${piece.filename}" alt="${piece.title}"
                  style="width:100%;max-width:300px;height:auto;display:block;"
                  onerror="this.style.background='#1a1a1a';this.style.minHeight='200px'">
              </div>
              <p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-2);margin-top:12px;letter-spacing:0.08em;">${piece.title} — ${piece.year}</p>
            </div>`;
        });
      }
    </script>
  </body>
</html>
