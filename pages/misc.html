<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Miscellaneous — Chris Jacobs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../images/favicon2.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GKH1LPCHRY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GKH1LPCHRY');
    </script>
    <style>
      .misc-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px;
        text-align: center;
        position: relative;
      }
      .misc-bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 60px 60px;
        opacity: 0.5;
        pointer-events: none;
        z-index: 0;
      }
      .misc-content {
        position: relative;
        z-index: 1;
        max-width: 560px;
      }
      .misc-eyebrow {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--accent);
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .misc-eyebrow::before,
      .misc-eyebrow::after {
        content: "";
        display: block;
        width: 24px;
        height: 1px;
        background: var(--accent);
      }
      .misc-title {
        font-family: "DM Serif Display", serif;
        font-size: clamp(40px, 6vw, 64px);
        color: var(--text-1);
        letter-spacing: -0.03em;
        line-height: 1;
        margin-bottom: 20px;
      }
      .misc-title em {
        color: var(--accent);
        font-style: italic;
      }
      .misc-sub {
        font-size: 15px;
        color: var(--text-2);
        line-height: 1.8;
        margin-bottom: 48px;
      }
      .misc-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 48px;
      }
      .misc-back {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--text-3);
        text-decoration: none;
        letter-spacing: 0.1em;
        transition: color 0.2s;
      }
      .misc-back:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <script>window.CJ_SECTION = "misc";</script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/cursor.js"></script>

    <div class="misc-bg-grid"></div>
    <div class="misc-wrap">
      <div class="misc-content">
        <div class="misc-eyebrow">Miscellaneous</div>
        <h1 class="misc-title">Everything <em>Else.</em></h1>
        <p class="misc-sub">
          MIJ guitars, PC builds, sim racing, audio gear. The rabbit holes are
          deep, numerous, and occasionally expensive. Content rotating in soon.
        </p>
        <div class="misc-tags">
          <span class="tag">Guitars</span>
          <span class="tag">PC Builds</span>
          <span class="tag">Sim Racing</span>
          <span class="tag">Audio</span>
          <span class="tag accent">Rotating Spotlight</span>
        </div>
        <a href="../index.html" class="misc-back">← Back to home</a>
      </div>
    </div>

    <script>
      const saved = localStorage.getItem("cj-theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
    </script>
  </body>
</html>
