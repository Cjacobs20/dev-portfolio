<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photography — Chris Jacobs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="../images/favicon2.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ── NEUTRAL STAGE BACKGROUND PER THEME ── */
    :root[data-theme="dark"]  .photo-hero { background: #181818; }
    :root[data-theme="light"] .photo-hero { background: #e4e1dc; }
    :root[data-theme="alien"] .photo-hero { background: #0e1410; }

    /* ── VERTICAL SLIDER THEME PICKER ── */
    .theme-slider-wrap {
      position: fixed;
      /* Start: top right */
      top: 20px;
      right: 24px;
      z-index: 200;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      /* Animate to center-top on load */
      animation: theme-picker-settle 1.2s cubic-bezier(0.4,0,0.2,1) 0.6s forwards;
    }

    @keyframes theme-picker-settle {
      from {
        top: 20px;
        right: 24px;
        transform: scale(0.85);
      }
      to {
        top: 32px;
        right: calc(50% - 52px);
        transform: scale(1);
      }
    }

    /* After animation settles */
    .theme-slider-wrap.settled {
      top: 32px;
      right: calc(50% - 52px);
      transform: scale(1);
      animation: none;
    }

    .theme-slider {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: none;
    }

    .slider-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
    }

    .theme-slider-wrap:hover .slider-label {
      opacity: 1;
      transform: translateY(0);
    }

    /* Staggered reveal */
    .theme-slider:nth-child(1) .slider-label { transition-delay: 0s; }
    .theme-slider:nth-child(2) .slider-label { transition-delay: 0.08s; }
    .theme-slider:nth-child(3) .slider-label { transition-delay: 0.16s; }

    /* The bar track */
    .slider-track {
      width: 6px;
      height: 60px;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      position: relative;
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1), height 0.4s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }

    /* Reveal bar on wrap hover — slides down one at a time */
    .theme-slider-wrap:hover .slider-track {
      height: 80px;
    }
    .theme-slider-wrap:hover .theme-slider:nth-child(1) .slider-track { transition-delay: 0s; }
    .theme-slider-wrap:hover .theme-slider:nth-child(2) .slider-track { transition-delay: 0.07s; }
    .theme-slider-wrap:hover .theme-slider:nth-child(3) .slider-track { transition-delay: 0.14s; }

    /* Widens on hold */
    .theme-slider.holding .slider-track {
      width: 20px;
      height: 120px;
    }

    /* Fill level — shows intensity */
    .slider-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      border-radius: 4px;
      transition: height 0.15s ease;
    }

    .theme-slider[data-t="dark"]  .slider-fill { background: #0af5e7; }
    .theme-slider[data-t="light"] .slider-fill { background: #007a72; }
    .theme-slider[data-t="alien"] .slider-fill { background: #0af596; }

    /* Active indicator dot */
    .slider-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      transition: border-color 0.3s, transform 0.3s;
      flex-shrink: 0;
    }
    .theme-slider.active .slider-dot {
      border-color: var(--accent);
      transform: scale(1.3);
    }
    .theme-slider[data-t="dark"]  .slider-dot { background: #1a1a1a; }
    .theme-slider[data-t="light"] .slider-dot { background: #f5f2ed; }
    .theme-slider[data-t="alien"] .slider-dot { background: #041208; }
      position: relative;
      width: 100%;
      height: 80vh;
      min-height: 560px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .photo-hero::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 35%;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    .carousel-stage {
      position: relative;
      width: 100%;
      height: 100%;
      perspective: 1600px;
      perspective-origin: 50% 48%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel-ring {
      position: relative;
      width: 600px;
      height: 440px;
      transform-style: preserve-3d;
    }

    .carousel-card {
      position: absolute;
      width: 600px;
      height: 440px;
      border-radius: 3px;
      overflow: visible;
      backface-visibility: hidden;
      cursor: none;
    }

    .carousel-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 3px;
      pointer-events: none;
      user-select: none;
    }

    .hero-overlay {
      position: absolute;
      bottom: 32px;
      left: 80px;
      right: 80px;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      pointer-events: none;
    }
    .hero-caption {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.1em;
      transition: opacity 0.4s ease;
    }
    .hero-exif-strip {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.08em;
      text-align: right;
      transition: opacity 0.4s ease;
    }
    .hero-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .hero-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: background 0.4s, transform 0.4s;
      cursor: none;
    }
    .hero-dot.active {
      background: var(--accent);
      transform: scale(1.4);
    }

    /* ── NAV BAR ── */
    .photo-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 80px 0;
    }
    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-3);
      text-decoration: none;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 32px 80px 24px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-right: 8px;
    }
    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 5px 14px;
      border: 1px solid var(--border-mid);
      border-radius: 20px;
      color: var(--text-2);
      background: none;
      cursor: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      border-color: var(--accent);
      color: #000;
      background: var(--accent);
    }

    /* ── MASONRY GRID ── */
    .masonry-wrap {
      padding: 0 80px 80px;
    }
    .masonry-grid {
      columns: 3;
      column-gap: 16px;
    }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: none;
    }
    .masonry-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
      border-radius: 4px;
    }
    .masonry-item:hover img { transform: scale(1.03); }
    .masonry-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
    }
    .masonry-item:hover .masonry-overlay { opacity: 1; }
    .masonry-caption {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #fff;
      margin-bottom: 4px;
    }
    .masonry-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.06em;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 80px;
      text-align: center;
    }
    .empty-state .mono {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: block;
    }
    .empty-state p {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.7;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }
    .lightbox-inner {
      display: flex;
      gap: 40px;
      align-items: center;
      max-width: 90vw;
      max-height: 90vh;
    }
    .lightbox-img-wrap {
      flex: 1;
      max-height: 85vh;
      display: flex;
      align-items: center;
    }
    .lightbox-img-wrap img {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
    }
    .lightbox-info {
      width: 240px;
      flex-shrink: 0;
    }
    .lightbox-caption {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .lightbox-category {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .exif-table { width: 100%; }
    .exif-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .exif-row:last-child { border-bottom: none; }
    .exif-key {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .exif-val {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.04em;
      text-align: right;
    }
    .lightbox-close {
      position: fixed;
      top: 24px; right: 32px;
      font-size: 24px;
      color: rgba(255,255,255,0.5);
      background: none;
      border: none;
      cursor: none;
      transition: color 0.2s;
      z-index: 201;
      line-height: 1;
    }
    .lightbox-close:hover { color: #fff; }
    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 32px;
      cursor: none;
      transition: color 0.2s;
      z-index: 201;
      padding: 16px;
    }
    .lightbox-nav:hover { color: #fff; }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    /* ── PLACEHOLDER TILES ── */
    .placeholder-tile {
      width: 100%;
      background: var(--bg-3);
      border: 1px dashed var(--border-mid);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.08em;
    }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      .photo-nav { padding: 24px; }
      .filter-bar { padding: 24px 24px 16px; }
      .masonry-wrap { padding: 0 24px 48px; }
      .masonry-grid { columns: 2; }
      .hero-overlay { left: 24px; right: 24px; bottom: 24px; }
      .lightbox-inner { flex-direction: column; max-width: 95vw; }
      .lightbox-info { width: 100%; }
    }
    @media (max-width: 480px) {
      .masonry-grid { columns: 1; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Auth guard -->
  <script>window.CJ_SECTION = 'photo';</script>

  <!-- Vertical Slider Theme Picker -->
  <div class="theme-slider-wrap" id="themeSliderWrap">
    <div class="theme-slider active" data-t="dark">
      <span class="slider-label">Dark</span>

      </div>
      <div class="slider-dot"></div>
    </div>
    <div class="theme-slider" data-t="alien">
      <span class="slider-label">Alien</span>
      <div class="slider-track">
        <div class="slider-fill" style="height:50%"></div>
      </div>
      <div class="slider-dot"></div>

  <!-- 3D Carousel Hero -->
  <div class="photo-hero" id="photoHero">
    <div class="carousel-stage">
      <div class="carousel-ring" id="carouselRing"></div>
    </div>
    <div class="hero-overlay">
      <div class="hero-caption" id="heroCaption"></div>
      <div class="hero-exif-strip" id="heroExif"></div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </div>

  <!-- Page nav -->
  <div class="photo-nav">
    <a href="../index.html" class="back-link">← Home</a>
    <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-3);letter-spacing:0.1em;">
      PHOTOGRAPHY
    </span>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Filter</span>
  </div>

  <!-- Masonry grid -->
  <div class="masonry-wrap">
    <div class="masonry-grid" id="masonryGrid"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev">‹</button>
    <button class="lightbox-nav lightbox-next" id="lbNext">›</button>
    <div class="lightbox-inner">
      <div class="lightbox-img-wrap">
        <img src="" alt="" id="lbImg">
      </div>
      <div class="lightbox-info">
        <div class="lightbox-caption" id="lbCaption"></div>
        <div class="lightbox-category" id="lbCategory"></div>
        <div class="exif-table" id="lbExif"></div>
      </div>
    </div>
  </div>

  <script>
    // ── CURSOR ──
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = -100, my = -100, rx = -100, ry = -100;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function animCursor() {
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
      rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animCursor);
    })();

    // ── THEME ──
    const savedTheme = localStorage.getItem('cj-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    // ── VERTICAL SLIDER THEME PICKER ──
    const wrap = document.getElementById('themeSliderWrap');
    const sliders = document.querySelectorAll('.theme-slider');

    // Mark active on load
    const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
    sliders.forEach(s => s.classList.toggle('active', s.dataset.t === currentTheme));

    // Settle animation — after animation completes, lock position via class
    setTimeout(() => wrap.classList.add('settled'), 1800);

    // Intensity map per theme — stores 0-100 value
    const intensity = { dark: 100, light: 50, alien: 50 };

    // Theme CSS variable sets keyed by intensity
    // We interpolate accent saturation and bg darkness
    function applyIntensity(theme, val) {
      const root = document.documentElement;
      // Clamp 0-100
      val = Math.max(0, Math.min(100, val));
      intensity[theme] = val;

      if (root.getAttribute('data-theme') !== theme) return;

      const t = val / 100;
      if (theme === 'dark') {
        // Intensity affects accent brightness
        const r = Math.round(10 * t);
        const g = Math.round(245 * t);
        const b = Math.round(231 * t);
        root.style.setProperty('--accent', `rgb(${r},${g},${b})`);
        root.style.setProperty('--glow', `rgba(${r},${g},${b},${0.08 + 0.14 * t})`);
      } else if (theme === 'light') {
        const g = Math.round(60 + 62 * t);
        root.style.setProperty('--accent', `rgb(0,${g},${Math.round(g * 0.92)})`);
      } else if (theme === 'alien') {
        const g = Math.round(150 + 95 * t);
        root.style.setProperty('--accent', `rgb(10,${g},${Math.round(g * 0.63)})`);
        root.style.setProperty('--glow', `rgba(10,${g},100,${0.1 + 0.2 * t})`);
      }
    }

    sliders.forEach(slider => {
      const theme = slider.dataset.t;
      const track = slider.querySelector('.slider-track');
      const fill = slider.querySelector('.slider-fill');
      let holdTimer, isDragging = false, dragStartY, dragStartVal;

      // Update fill height visually
      function setFill(val) {
        fill.style.height = val + '%';
      }

      // Click — activate theme
      slider.addEventListener('click', () => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('cj-theme', theme);
        sliders.forEach(s => s.classList.remove('active'));
        slider.classList.add('active');
        // Reset CSS overrides from other themes
        document.documentElement.style.removeProperty('--accent');
        document.documentElement.style.removeProperty('--glow');
        applyIntensity(theme, intensity[theme]);
      });

      // Hold — widen for drag
      slider.addEventListener('mousedown', e => {
        holdTimer = setTimeout(() => {
          slider.classList.add('holding');
          isDragging = true;
          dragStartY = e.clientY;
          dragStartVal = intensity[theme];
        }, 300);
      });

      document.addEventListener('mousemove', e => {
        if (!isDragging || slider !== document.querySelector('.theme-slider.holding')) return;
        const dy = dragStartY - e.clientY; // drag up = increase
        const newVal = Math.max(0, Math.min(100, dragStartVal + dy * 0.8));
        intensity[theme] = newVal;
        setFill(newVal);
        applyIntensity(theme, newVal);
      });

      document.addEventListener('mouseup', () => {
        clearTimeout(holdTimer);
        if (isDragging) {
          slider.classList.remove('holding');
          isDragging = false;
        }
      });

      // Init fill
      setFill(intensity[theme]);
    });

    // ── LOAD PHOTOS ──
    let allPhotos = [];
    let filteredPhotos = [];
    let currentLbIndex = 0;
    let activeFilter = 'all';

    // Seed RNG from session start time so hero order is consistent per session
    // but randomized between sessions
    const SESSION_SEED = Math.floor(Date.now() / (1000 * 60 * 30)); // changes every 30min
    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }
    function shuffleSeeded(arr, seed) {
      const rng = seededRandom(seed);
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    fetch('../data/photos.json')
      .then(r => r.json())
      .then(data => {
        allPhotos = data.photos;
        buildFilters(data.categories);
        renderGrid('all');
        buildHero();
      })
      .catch(() => {
        // No photos yet — show empty state
        document.getElementById('masonryGrid').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <span class="mono">No photos yet</span>
            <p>Add photos to <code>images/photos/</code> and entries to <code>data/photos.json</code> to populate this gallery.</p>
          </div>`;
      });

    // ── 3D CAROUSEL HERO ──
    function buildHero() {
      const featured = allPhotos.filter(p => p.featured);
      if (!featured.length) return;
      const photos = shuffleSeeded(featured, SESSION_SEED);
      const count = photos.length;
      const ring = document.getElementById('carouselRing');
      const dots = document.getElementById('heroDots');

      const ANGLE_STEP = 360 / count;

      // Responsive radius — scales with viewport width
      function getRadius() {
        return Math.max(600, window.innerWidth * 0.42);
      }

      const cards = photos.map((photo, i) => {
        const card = document.createElement('div');
        card.className = 'carousel-card';
        const img = document.createElement('img');
        img.src = `../images/photos/${photo.filename}`;
        img.alt = photo.caption || '';
        card.appendChild(img);
        ring.appendChild(card);

        const dot = document.createElement('div');
        dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goTo(i));
        dots.appendChild(dot);

        return { card, photo };
      });

      let current = 0;
      let animating = false;
      let autoTimer;

      function positionCards(activeIndex) {
        const RADIUS = getRadius();
        cards.forEach(({ card }, i) => {
          const offset = i - activeIndex;
          const angle = offset * ANGLE_STEP;
          const rad = (angle * Math.PI) / 180;

          const cosVal = Math.cos(rad);
          const sinVal = Math.sin(rad);

          const z = cosVal * RADIUS - RADIUS;
          const x = sinVal * RADIUS * 0.38;

          const scale = 0.48 + 0.52 * ((cosVal + 1) / 2);
          const rotateY = -angle * 0.55;
          const opacity = 0.2 + 0.8 * ((cosVal + 1) / 2);
          const zIndex = Math.round(100 * ((cosVal + 1) / 2));

          const shadowX = -sinVal * 28;
          const shadowY = 36 + 12 * (1 - (cosVal + 1) / 2);
          const shadowBlur = 20 + 40 * (1 - (cosVal + 1) / 2);
          const shadowOpacity = 0.1 + 0.5 * (1 - (cosVal + 1) / 2);

          card.style.transition = animating
            ? 'transform 1s cubic-bezier(0.4,0,0.2,1), opacity 1s ease, box-shadow 1s ease'
            : 'none';
          card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${rotateY}deg) scale(${scale})`;
          card.style.opacity = opacity;
          card.style.zIndex = zIndex;
          card.style.boxShadow = `${shadowX}px ${shadowY}px ${shadowBlur}px rgba(0,0,0,${shadowOpacity})`;
        });

        updateHeroInfo(cards[activeIndex].photo);
        document.querySelectorAll('.hero-dot').forEach((d, i) => {
          d.classList.toggle('active', i === activeIndex);
        });
      }

      function goTo(index) {
        current = ((index % count) + count) % count;
        animating = true;
        positionCards(current);
        clearTimeout(autoTimer);
        autoTimer = setTimeout(advance, 5000);
      }

      function advance() { goTo((current + 1) % count); }

      // Reposition on resize
      window.addEventListener('resize', () => positionCards(current));

      positionCards(0);
      autoTimer = setTimeout(() => { animating = true; advance(); }, 5000);
    }

    function updateHeroInfo(photo) {
      document.getElementById('heroCaption').textContent = photo.caption || '';
      const exif = photo.exif;
      if (exif) {
        const parts = [exif.camera, exif.lens, exif.aperture, exif.shutter, exif.iso ? `ISO ${exif.iso}` : '', exif.film].filter(Boolean);
        document.getElementById('heroExif').textContent = parts.join(' · ');
      }
    }

    // ── FILTERS ──
    function buildFilters(categories) {
      const bar = document.getElementById('filterBar');
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = cat;
          renderGrid(cat);
        });
        bar.appendChild(btn);
      });
    }

    // ── MASONRY GRID ──
    function renderGrid(filter) {
      const grid = document.getElementById('masonryGrid');
      grid.innerHTML = '';
      filteredPhotos = filter === 'all'
        ? allPhotos
        : allPhotos.filter(p => p.category === filter);

      if (!filteredPhotos.length) {
        grid.innerHTML = `<div class="empty-state"><span class="mono">No photos in this category yet</span></div>`;
        return;
      }

      filteredPhotos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'masonry-item';
        item.innerHTML = `
          <img
            src="../images/photos/${photo.filename}"
            alt="${photo.caption || ''}"
            loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=\\'placeholder-tile\\' style=\\'aspect-ratio:${photo.width}/${photo.height};\\'>[ ${photo.filename} ]</div>'"
          >
          <div class="masonry-overlay">
            <div class="masonry-caption">${photo.caption || ''}</div>
            <div class="masonry-meta">${photo.category} · ${photo.date}</div>
          </div>`;
        item.addEventListener('click', () => openLightbox(i));
        grid.appendChild(item);
      });
    }

    // ── LIGHTBOX ──
    function openLightbox(index) {
      currentLbIndex = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      const photo = filteredPhotos[currentLbIndex];
      document.getElementById('lbImg').src = `../images/photos/${photo.filename}`;
      document.getElementById('lbImg').alt = photo.caption || '';
      document.getElementById('lbCaption').textContent = photo.caption || '';
      document.getElementById('lbCategory').textContent = photo.category;

      const exif = photo.exif || {};
      const exifRows = [
        ['Camera', exif.camera],
        ['Lens', exif.lens],
        ['Aperture', exif.aperture],
        ['Shutter', exif.shutter],
        ['ISO', exif.iso],
        ['Film', exif.film]
      ].filter(([,v]) => v);

      document.getElementById('lbExif').innerHTML = exifRows
        .map(([k,v]) => `<div class="exif-row"><span class="exif-key">${k}</span><span class="exif-val">${v}</span></div>`)
        .join('');
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => {
      currentLbIndex = (currentLbIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
      updateLightbox();
    });
    document.getElementById('lbNext').addEventListener('click', () => {
      currentLbIndex = (currentLbIndex + 1) % filteredPhotos.length;
      updateLightbox();
    });
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { currentLbIndex = (currentLbIndex - 1 + filteredPhotos.length) % filteredPhotos.length; updateLightbox(); }
      if (e.key === 'ArrowRight') { currentLbIndex = (currentLbIndex + 1) % filteredPhotos.length; updateLightbox(); }
    });
  </script>
</body>
</html>
