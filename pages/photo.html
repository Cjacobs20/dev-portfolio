<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photography — Chris Jacobs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="../images/favicon2.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>

    /* ── NEUTRAL STAGE BACKGROUND PER THEME ── */
    :root[data-theme="dark"]  .photo-hero { background: #181818; }
    :root[data-theme="light"] .photo-hero { background: #e4e1dc; }
    :root[data-theme="alien"] .photo-hero { background: #0e1410; }

    /* ── 3D CAROUSEL HERO ── */
    .photo-hero {
      position: relative;
      width: 100%;
      height: 80vh;
      min-height: 560px;
      background: #181818;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.4s ease;
    }

    .photo-hero::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    .carousel-stage {
      position: relative;
      width: 100%;
      height: 100%;
      perspective: 1600px;
      perspective-origin: 50% 48%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel-ring {
      position: relative;
      width: 600px;
      height: 440px;
      transform-style: preserve-3d;
    }

    .carousel-card {
      position: absolute;
      width: 600px;
      height: 440px;
      border-radius: 3px;
      overflow: visible;
      backface-visibility: hidden;
      cursor: none;
    }

    .carousel-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 3px;
      pointer-events: none;
      user-select: none;
    }

    .hero-overlay {
      position: absolute;
      bottom: 32px;
      left: 80px;
      right: 80px;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      pointer-events: none;
    }
    .hero-caption {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.1em;
    }
    .hero-exif-strip {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.08em;
      text-align: right;
    }
    .hero-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .hero-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: background 0.4s, transform 0.4s;
      cursor: none;
    }
    .hero-dot.active {
      background: var(--accent);
      transform: scale(1.4);
    }

    /* ── THERMOMETER SLIDER THEME PICKER ── */
    .theme-slider-wrap {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 200;
      display: flex;
      gap: 6px;
      align-items: flex-start;
      animation: picker-settle 1.4s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
      opacity: 0;
      overflow: visible;
    }

    @keyframes picker-settle {
      0%   { top: 20px; right: 24px; opacity: 0; transform: scale(0.7); }
      100% { top: 20px; left: 50%; transform: translateX(-50%) scale(1); opacity: 1; right: auto; }
    }

    .theme-slider-wrap.settled {
      top: 20px;
      left: 50%;
      right: auto;
      transform: translateX(-50%);
      animation: none;
      opacity: 1;
    }

    .theme-slider {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: none;
      position: relative;
      overflow: visible;
      transition: margin 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    .theme-slider:hover {
      margin-left: 10px;
      margin-right: 10px;
    }

    .slider-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
      margin-bottom: 2px;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    .theme-slider:hover .slider-label,
    .theme-slider.active .slider-label {
      opacity: 1;
      transform: translateY(0);
    }

    .slider-canvas {
      display: block;
      cursor: none;
      overflow: visible;
    }

    /* ── NAV BAR ── */
    .photo-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 80px 0;
    }
    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-3);
      text-decoration: none;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 32px 80px 24px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-right: 8px;
    }
    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 5px 14px;
      border: 1px solid var(--border-mid);
      border-radius: 20px;
      color: var(--text-2);
      background: none;
      cursor: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      border-color: var(--accent);
      color: #000;
      background: var(--accent);
    }

    /* ── MASONRY GRID ── */
    .masonry-wrap { padding: 0 80px 80px; }
    .masonry-grid { columns: 3; column-gap: 16px; }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: none;
    }
    .masonry-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
      border-radius: 4px;
    }
    .masonry-item:hover img { transform: scale(1.03); }
    .masonry-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
    }
    .masonry-item:hover .masonry-overlay { opacity: 1; }
    .masonry-caption { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #fff; margin-bottom: 4px; }
    .masonry-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 0.06em; }

    /* ── EMPTY STATE ── */
    .empty-state { padding: 80px; text-align: center; }
    .empty-state .mono { font-size: 11px; color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 14px; color: var(--text-2); line-height: 1.7; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox-inner { display: flex; gap: 40px; align-items: center; max-width: 90vw; max-height: 90vh; }
    .lightbox-img-wrap { flex: 1; max-height: 85vh; display: flex; align-items: center; }
    .lightbox-img-wrap img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 4px; }
    .lightbox-info { width: 240px; flex-shrink: 0; }
    .lightbox-caption { font-family: 'DM Serif Display', serif; font-size: 22px; color: #fff; letter-spacing: -0.01em; margin-bottom: 8px; }
    .lightbox-category { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 24px; }
    .exif-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .exif-row:last-child { border-bottom: none; }
    .exif-key { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; text-transform: uppercase; }
    .exif-val { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.8); letter-spacing: 0.04em; text-align: right; }
    .lightbox-close { position: fixed; top: 24px; right: 32px; font-size: 24px; color: rgba(255,255,255,0.5); background: none; border: none; cursor: none; transition: color 0.2s; z-index: 201; line-height: 1; }
    .lightbox-close:hover { color: #fff; }
    .lightbox-nav { position: fixed; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.4); font-size: 32px; cursor: none; transition: color 0.2s; z-index: 201; padding: 16px; }
    .lightbox-nav:hover { color: #fff; }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      .photo-nav { padding: 24px; }
      .filter-bar { padding: 24px 24px 16px; }
      .masonry-wrap { padding: 0 24px 48px; }
      .masonry-grid { columns: 2; }
      .hero-overlay { left: 24px; right: 24px; bottom: 24px; }
      .lightbox-inner { flex-direction: column; max-width: 95vw; }
      .lightbox-info { width: 100%; }
      .theme-slider-wrap { animation: none; top: 16px; right: 16px; }
      .theme-slider-wrap.settled { top: 16px; right: 16px; }
    }
    @media (max-width: 480px) {
      .masonry-grid { columns: 1; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <script>window.CJ_SECTION = 'photo';</script>
  <script src="../js/auth-guard.js"></script>

  <!-- Organic Vertical Slider Theme Picker -->
  <div class="theme-slider-wrap" id="themeSliderWrap">
  </div>

  <!-- 3D Carousel Hero -->
  <div class="photo-hero" id="photoHero">
    <div class="carousel-stage">
      <div class="carousel-ring" id="carouselRing"></div>
    </div>
    <div class="hero-overlay">
      <div class="hero-caption" id="heroCaption"></div>
      <div class="hero-exif-strip" id="heroExif"></div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </div>

  <div class="photo-nav">
    <a href="../index.html" class="back-link">← Home</a>
    <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-3);letter-spacing:0.1em;">PHOTOGRAPHY</span>
  </div>

  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Filter</span>
  </div>

  <div class="masonry-wrap">
    <div class="masonry-grid" id="masonryGrid"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev">‹</button>
    <button class="lightbox-nav lightbox-next" id="lbNext">›</button>
    <div class="lightbox-inner">
      <div class="lightbox-img-wrap"><img src="" alt="" id="lbImg"></div>
      <div class="lightbox-info">
        <div class="lightbox-caption" id="lbCaption"></div>
        <div class="lightbox-category" id="lbCategory"></div>
        <div class="exif-table" id="lbExif"></div>
      </div>
    </div>
  </div>

  <script>
    // ── CURSOR ──
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = -100, my = -100, rx = -100, ry = -100;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function animCursor() {
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
      rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animCursor);
    })();

    // ── THEME ──
    const savedTheme = localStorage.getItem('cj-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    // ── THERMOMETER SLIDER THEME PICKER ──
    const THEMES = [
      { key: 'dark',  label: 'Dark',  color: [10, 245, 231] },
      { key: 'light', label: 'Light', color: [0, 190, 168]  },
      { key: 'alien', label: 'Alien', color: [10, 245, 150] }
    ];

    const intensity = { dark: 0.8, light: 0.8, alien: 0.8 };
    const wrap = document.getElementById('themeSliderWrap');

    const CW = 48;          // canvas CSS width — wide enough to prevent clipping
    const CH = 200;         // canvas CSS height
    const DPR = 2;

    // Thermometer geometry (CSS px)
    const ANCHOR_Y = 6;
    const STEM_H = 12;
    const STEM_W = 6;
    const TUBE_W = 13;
    const TUBE_R = TUBE_W / 2;
    const BULB_R = 17;
    const THERMO_FULL = 120;
    const CASING = 3;

    THEMES.forEach(({ key, label, color }) => {
      const slider = document.createElement('div');
      slider.className = 'theme-slider' + (key === savedTheme ? ' active' : '');
      slider.dataset.t = key;

      const lbl = document.createElement('span');
      lbl.className = 'slider-label';
      lbl.textContent = label;

      const canvas = document.createElement('canvas');
      canvas.className = 'slider-canvas';
      canvas.width = CW * DPR;
      canvas.height = CH * DPR;
      canvas.style.width = CW + 'px';
      canvas.style.height = CH + 'px';
      const ctx = canvas.getContext('2d');

      slider.appendChild(lbl);
      slider.appendChild(canvas);
      wrap.appendChild(slider);

      // Physics
      let extY = 0;         // current extension (0=retracted, THERMO_FULL=extended)
      let extV = 0;         // velocity for drop
      let extTarget = 0;

      // Pendulum wiggle
      let wiggleAng = 0;    // current swing angle (radians)
      let wiggleV = 0;      // angular velocity
      let wiggleActive = false;

      let fillY = 0;
      let fillTarget = 0;
      let jiggleT = Math.random() * Math.PI * 2;
      let hovered = false;
      let isDragging = false;
      let holdTimer;
      let dragStartY, dragStartVal;
      let rafId;

      function isActive() { return slider.classList.contains('active'); }

      function draw(t) {
        const s = DPR;
        const w = CW * s;
        const h = CH * s;
        const cx = w / 2;
        const [r, g, b] = color;
        const fillColor = `rgb(${r},${g},${b})`;
        const active = isActive();
        const glowAlpha = active ? 1.0 : (hovered ? 0.6 : 0.2);
        const glowBlur = active ? 20 * s : (hovered ? 12 * s : 5 * s);

        ctx.clearRect(0, 0, w, h);

        const anchorY = ANCHOR_Y * s;
        const stemH = STEM_H * s;
        const stemW = STEM_W * s;
        const tubeW = TUBE_W * s;
        const tubeR = TUBE_R * s;
        const bulbR = BULB_R * s;
        const cas = CASING * s;
        const ext = extY * s;

        // Anchor is always fixed — tube top hangs from it
        // Pendulum: offset everything by wiggle angle
        const swingOffset = Math.sin(wiggleAng) * ext * 0.3;

        // Fixed anchor point
        const anchorPx = anchorY + stemH;

        // Tube starts at anchor, extends down by ext
        // Everything offset horizontally by swing
        const tubeTopX = cx + swingOffset * 0;  // anchor fixed at cx
        const tubeTopY = anchorPx;
        const tubeBotX = cx + swingOffset;
        const tubeBotY = anchorPx + ext;
        const tubeH = ext - BULB_R * s * (ext / (THERMO_FULL * s)) * 2;
        const bulbCX = tubeBotX;
        const bulbCY = tubeBotY;

        ctx.save();
        ctx.translate(0, 0);

        // ── STEM STUB (always at anchor, never moves) ──
        // Outer casing
        ctx.beginPath();
        ctx.roundRect(cx - stemW / 2 - cas, anchorY, stemW + cas * 2, stemH + cas, 4);
        ctx.fillStyle = '#111';
        ctx.fill();
        // Colored inner — more visible for inactive
        ctx.beginPath();
        ctx.roundRect(cx - stemW / 2, anchorY + 1, stemW, stemH - 1, 3);
        ctx.fillStyle = `rgba(${r},${g},${b},${active ? 0.7 : 0.35})`;
        ctx.shadowColor = fillColor;
        ctx.shadowBlur = active ? 10 * s : 4 * s;
        ctx.fill();
        ctx.shadowBlur = 0;

        if (ext < 2) { ctx.restore(); return; }

        // ── LINE from anchor to tube top (the "string" when swinging) ──
        if (Math.abs(swingOffset) > 1) {
          ctx.beginPath();
          ctx.moveTo(cx, anchorPx);
          ctx.lineTo(cx + swingOffset * 0.4, anchorPx + ext * 0.3);
          ctx.strokeStyle = `rgba(${r},${g},${b},0.15)`;
          ctx.lineWidth = stemW * 0.5;
          ctx.stroke();
        }

        // ── UNIFIED BODY — casing ──
        // Draw as one continuous shape: tube merges into bulb
        ctx.save();
        ctx.translate(swingOffset, 0);

        const bodyLeft  = cx - tubeW / 2 - cas;
        const bodyRight = cx + tubeW / 2 + cas;
        const bodyTop   = anchorPx - cas;
        const bodyBot   = anchorPx + ext * 0.75; // tube portion

        ctx.beginPath();
        ctx.moveTo(cx - tubeW / 2 - cas, anchorPx);
        ctx.lineTo(cx - tubeW / 2 - cas, anchorPx + ext - bulbR);
        ctx.arc(cx, anchorPx + ext, bulbR + cas, Math.PI, 0, true);
        ctx.lineTo(cx + tubeW / 2 + cas, anchorPx);
        ctx.closePath();
        ctx.fillStyle = '#0d0d0d';
        ctx.fill();

        // ── FLESHY TRANSLUCENT BODY ──
        ctx.beginPath();
        ctx.moveTo(cx - tubeW / 2, anchorPx + tubeR);
        ctx.arcTo(cx - tubeW / 2, anchorPx, cx, anchorPx, tubeR);
        ctx.arcTo(cx + tubeW / 2, anchorPx, cx + tubeW / 2, anchorPx + tubeR, tubeR);
        ctx.lineTo(cx + tubeW / 2, anchorPx + ext - bulbR);
        ctx.arc(cx, anchorPx + ext, bulbR, 0, Math.PI, false);
        ctx.closePath();
        ctx.fillStyle = `rgba(${r},${g},${b},${active ? 0.09 : 0.04})`;
        ctx.fill();
        ctx.strokeStyle = `rgba(255,255,255,${active ? 0.14 : 0.05})`;
        ctx.lineWidth = s * 0.5;
        ctx.stroke();

        // ── NEON FILL ──
        ctx.save();
        // Clip to inner body
        ctx.beginPath();
        ctx.moveTo(cx - tubeW / 2, anchorPx + tubeR);
        ctx.arcTo(cx - tubeW / 2, anchorPx, cx, anchorPx, tubeR);
        ctx.arcTo(cx + tubeW / 2, anchorPx, cx + tubeW / 2, anchorPx + tubeR, tubeR);
        ctx.lineTo(cx + tubeW / 2, anchorPx + ext - bulbR);
        ctx.arc(cx, anchorPx + ext, bulbR, 0, Math.PI, false);
        ctx.closePath();
        ctx.clip();

        ctx.shadowColor = fillColor;
        ctx.shadowBlur = glowBlur;
        ctx.globalAlpha = glowAlpha;

        // Bulb reservoir — always present, size = fill level
        const bulbFillR = bulbR * (0.35 + 0.65 * fillY);
        ctx.beginPath();
        ctx.arc(cx, anchorPx + ext, bulbFillR, 0, Math.PI * 2);
        ctx.fillStyle = fillColor;
        ctx.fill();

        // Tube fill rises from bulb
        if (fillY > 0.02 && ext > bulbR * s) {
          const tubeInnerH = ext - bulbR - tubeR;
          const fillH = tubeInnerH * fillY;
          const fillTop = anchorPx + ext - bulbR - fillH;
          const jigAmt = (hovered ? 3 : 1) * s;
          const surfaceY = fillTop + Math.sin(t * 3.4 + jiggleT) * jigAmt;
          const bulgeSide = Math.sin(t * 2.1 + jiggleT + 1) * jigAmt * 0.4;

          ctx.beginPath();
          ctx.moveTo(cx - tubeW / 2, anchorPx + ext);
          ctx.lineTo(cx - tubeW / 2, surfaceY);
          ctx.bezierCurveTo(
            cx - tubeW / 2 + bulgeSide, surfaceY - 4 * s,
            cx + tubeW / 2 - bulgeSide, surfaceY - 4 * s,
            cx + tubeW / 2, surfaceY
          );
          ctx.lineTo(cx + tubeW / 2, anchorPx + ext);
          ctx.closePath();
          ctx.fillStyle = fillColor;
          ctx.fill();

          // Slime drip upward from surface
          const dripPhase = Math.max(0, Math.sin(t * 1.1 + jiggleT * 1.8));
          const dripLen = dripPhase * 9 * s * fillY;
          if (dripLen > 2) {
            ctx.beginPath();
            ctx.ellipse(cx, surfaceY - dripLen * 0.5, 2.5 * s, dripLen * 0.55, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${r},${g},${b},0.75)`;
            ctx.fill();
          }
        }

        ctx.restore(); // end fill clip

        // ── GLASS HIGHLIGHT ──
        const grad = ctx.createLinearGradient(cx - tubeW / 2, 0, cx - tubeW / 5, 0);
        grad.addColorStop(0, 'rgba(255,255,255,0.14)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.roundRect(cx - tubeW / 2, anchorPx, tubeW / 3, ext - bulbR, tubeR);
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.restore(); // end translate(swingOffset)
        ctx.restore();
      }

      let startTime = null;
      function animate(ts) {
        if (!startTime) startTime = ts;
        const t = (ts - startTime) / 1000;
        jiggleT += 0.016;

        // Extension physics
        if (extTarget > extY) {
          // Drop — weighted gravity acceleration
          extV += 1.2;
          extV = Math.min(extV, 6);
          extY = Math.min(extTarget, extY + extV);
          // Trigger wiggle on landing
          if (extY >= extTarget && wiggleV === 0) {
            wiggleV = 0.08; // kick the pendulum
            wiggleActive = true;
          }
        } else if (extTarget < extY) {
          // Retract — viscous slow pull
          extV = 0;
          extY += (extTarget - extY) * 0.055;
          if (Math.abs(extTarget - extY) < 0.3) extY = extTarget;
          wiggleActive = false;
          wiggleAng *= 0.85; // dampen swing on retract
        }

        // Pendulum wiggle — damped oscillation
        if (wiggleActive || Math.abs(wiggleAng) > 0.001) {
          const PEND_K = 0.012;
          const PEND_D = 0.93;
          wiggleV -= wiggleAng * PEND_K;
          wiggleV *= PEND_D;
          wiggleAng += wiggleV;
          if (Math.abs(wiggleAng) < 0.001 && Math.abs(wiggleV) < 0.001) {
            wiggleAng = 0; wiggleV = 0; wiggleActive = false;
          }
        }

        // Fill drip
        if (extY > THERMO_FULL * 0.25) {
          fillY += (fillTarget - fillY) * 0.022;
        } else {
          fillY += (0 - fillY) * 0.12;
        }

        draw(t);
        rafId = requestAnimationFrame(animate);
      }
      rafId = requestAnimationFrame(animate);

      if (isActive()) fillTarget = intensity[key];

      slider.addEventListener('mouseenter', () => {
        hovered = true;
        extTarget = THERMO_FULL;
        fillTarget = isActive() ? intensity[key] : intensity[key] * 0.4;
      });

      slider.addEventListener('mouseleave', () => {
        if (isDragging) return;
        hovered = false;
        extTarget = 0;
        fillTarget = 0;
      });

      slider.addEventListener('click', () => {
        document.documentElement.setAttribute('data-theme', key);
        localStorage.setItem('cj-theme', key);
        document.querySelectorAll('.theme-slider').forEach(s => s.classList.remove('active'));
        slider.classList.add('active');
        fillTarget = intensity[key];
        const bgMap = { dark: '#181818', light: '#e4e1dc', alien: '#0e1410' };
        document.getElementById('photoHero').style.background = bgMap[key];
        document.documentElement.style.removeProperty('--accent');
        document.documentElement.style.removeProperty('--glow');
        applyIntensity(key, intensity[key]);
      });

      canvas.addEventListener('mousedown', e => {
        holdTimer = setTimeout(() => {
          isDragging = true;
          dragStartY = e.clientY;
          dragStartVal = intensity[key];
          extTarget = THERMO_FULL;
        }, 250);
      });

      document.addEventListener('mousemove', e => {
        if (!isDragging || slider.dataset.t !== key) return;
        const dy = dragStartY - e.clientY;
        const newVal = Math.max(0.05, Math.min(1.0, dragStartVal + dy * 0.008));
        intensity[key] = newVal;
        fillTarget = newVal;
        applyIntensity(key, newVal);
      });

      document.addEventListener('mouseup', () => {
        clearTimeout(holdTimer);
        if (isDragging) {
          isDragging = false;
          if (!hovered) { extTarget = 0; fillTarget = 0; }
        }
      });
    });

    function applyIntensity(theme, val) {
      if (document.documentElement.getAttribute('data-theme') !== theme) return;
      const t = val;
      const root = document.documentElement;
      if (theme === 'dark') {
        const ri = Math.round(10 * t), gi = Math.round(245 * t), bi = Math.round(231 * t);
        root.style.setProperty('--accent', `rgb(${ri},${gi},${bi})`);
        root.style.setProperty('--glow', `rgba(${ri},${gi},${bi},${0.06 + 0.16 * t})`);
      } else if (theme === 'light') {
        const gi = Math.round(80 + 110 * t);
        root.style.setProperty('--accent', `rgb(0,${gi},${Math.round(gi * 0.88)})`);
      } else if (theme === 'alien') {
        const gi = Math.round(100 + 145 * t);
        root.style.setProperty('--accent', `rgb(10,${gi},${Math.round(gi * 0.6)})`);
      }
    }

    setTimeout(() => document.getElementById('themeSliderWrap').classList.add('settled'), 2000);



    // ── LOAD PHOTOS ──
    let allPhotos = [];
    let filteredPhotos = [];
    let currentLbIndex = 0;

    const SESSION_SEED = Math.floor(Date.now() / (1000 * 60 * 30));
    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }
    function shuffleSeeded(arr, seed) {
      const rng = seededRandom(seed);
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    fetch('../data/photos.json')
      .then(r => r.json())
      .then(data => {
        allPhotos = data.photos;
        buildFilters(data.categories);
        renderGrid('all');
        buildHero();
      })
      .catch(() => {
        document.getElementById('masonryGrid').innerHTML = `
          <div class="empty-state">
            <span class="mono">No photos yet</span>
            <p>Add photos to images/photos/ and entries to data/photos.json.</p>
          </div>`;
      });

    // ── 3D CAROUSEL HERO ──
    function buildHero() {
      const featured = allPhotos.filter(p => p.featured);
      if (!featured.length) return;
      const photos = shuffleSeeded(featured, SESSION_SEED);
      const count = photos.length;
      const ring = document.getElementById('carouselRing');
      const dots = document.getElementById('heroDots');
      const ANGLE_STEP = 360 / count;

      function getRadius() { return Math.max(600, window.innerWidth * 0.42); }

      const cards = photos.map((photo, i) => {
        const card = document.createElement('div');
        card.className = 'carousel-card';
        const img = document.createElement('img');
        img.src = `../images/photos/${photo.filename}`;
        img.alt = photo.caption || '';
        card.appendChild(img);
        ring.appendChild(card);

        const dot = document.createElement('div');
        dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goTo(i));
        dots.appendChild(dot);

        return { card, photo };
      });

      let current = 0;
      let animating = false;
      let autoTimer;

      function positionCards(activeIndex) {
        const RADIUS = getRadius();
        cards.forEach(({ card }, i) => {
          const offset = i - activeIndex;
          const angle = offset * ANGLE_STEP;
          const rad = (angle * Math.PI) / 180;
          const cosVal = Math.cos(rad);
          const sinVal = Math.sin(rad);
          const z = cosVal * RADIUS - RADIUS;
          const x = sinVal * RADIUS * 0.38;
          const scale = 0.48 + 0.52 * ((cosVal + 1) / 2);
          const rotateY = -angle * 0.55;
          const opacity = 0.2 + 0.8 * ((cosVal + 1) / 2);
          const zIndex = Math.round(100 * ((cosVal + 1) / 2));
          const shadowX = -sinVal * 28;
          const shadowY = 36 + 12 * (1 - (cosVal + 1) / 2);
          const shadowBlur = 20 + 40 * (1 - (cosVal + 1) / 2);
          const shadowOpacity = 0.1 + 0.5 * (1 - (cosVal + 1) / 2);

          card.style.transition = animating
            ? 'transform 1s cubic-bezier(0.4,0,0.2,1), opacity 1s ease, box-shadow 1s ease'
            : 'none';
          card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${rotateY}deg) scale(${scale})`;
          card.style.opacity = opacity;
          card.style.zIndex = zIndex;
          card.style.boxShadow = `${shadowX}px ${shadowY}px ${shadowBlur}px rgba(0,0,0,${shadowOpacity})`;
        });

        updateHeroInfo(cards[activeIndex].photo);
        document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === activeIndex));
      }

      function goTo(index) {
        current = ((index % count) + count) % count;
        animating = true;
        positionCards(current);
        clearTimeout(autoTimer);
        autoTimer = setTimeout(advance, 5000);
      }

      function advance() { goTo((current + 1) % count); }

      window.addEventListener('resize', () => positionCards(current));
      positionCards(0);
      autoTimer = setTimeout(() => { animating = true; advance(); }, 5000);
    }

    function updateHeroInfo(photo) {
      document.getElementById('heroCaption').textContent = photo.caption || '';
      const exif = photo.exif || {};
      const parts = [exif.camera, exif.lens, exif.aperture, exif.shutter, exif.iso ? `ISO ${exif.iso}` : '', exif.film].filter(Boolean);
      document.getElementById('heroExif').textContent = parts.join(' · ');
    }

    // ── FILTERS ──
    function buildFilters(categories) {
      const bar = document.getElementById('filterBar');
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderGrid(cat);
        });
        bar.appendChild(btn);
      });
    }

    // ── MASONRY GRID ──
    function renderGrid(filter) {
      const grid = document.getElementById('masonryGrid');
      grid.innerHTML = '';
      filteredPhotos = filter === 'all' ? allPhotos : allPhotos.filter(p => p.category === filter);
      if (!filteredPhotos.length) {
        grid.innerHTML = `<div class="empty-state"><span class="mono">No photos in this category yet</span></div>`;
        return;
      }
      filteredPhotos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'masonry-item';
        item.innerHTML = `
          <img src="../images/photos/${photo.filename}" alt="${photo.caption || ''}" loading="lazy"
            onerror="this.style.background='var(--bg-3)';this.style.minHeight='200px'">
          <div class="masonry-overlay">
            <div class="masonry-caption">${photo.caption || ''}</div>
            <div class="masonry-meta">${photo.category} · ${photo.date}</div>
          </div>`;
        item.addEventListener('click', () => openLightbox(i));
        grid.appendChild(item);
      });
    }

    // ── LIGHTBOX ──
    function openLightbox(index) {
      currentLbIndex = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function updateLightbox() {
      const photo = filteredPhotos[currentLbIndex];
      document.getElementById('lbImg').src = `../images/photos/${photo.filename}`;
      document.getElementById('lbImg').alt = photo.caption || '';
      document.getElementById('lbCaption').textContent = photo.caption || '';
      document.getElementById('lbCategory').textContent = photo.category;
      const exif = photo.exif || {};
      const rows = [['Camera',exif.camera],['Lens',exif.lens],['Aperture',exif.aperture],['Shutter',exif.shutter],['ISO',exif.iso],['Film',exif.film]].filter(([,v])=>v);
      document.getElementById('lbExif').innerHTML = rows.map(([k,v])=>`<div class="exif-row"><span class="exif-key">${k}</span><span class="exif-val">${v}</span></div>`).join('');
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => { currentLbIndex = (currentLbIndex - 1 + filteredPhotos.length) % filteredPhotos.length; updateLightbox(); });
    document.getElementById('lbNext').addEventListener('click', () => { currentLbIndex = (currentLbIndex + 1) % filteredPhotos.length; updateLightbox(); });
    document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { currentLbIndex = (currentLbIndex - 1 + filteredPhotos.length) % filteredPhotos.length; updateLightbox(); }
      if (e.key === 'ArrowRight') { currentLbIndex = (currentLbIndex + 1) % filteredPhotos.length; updateLightbox(); }
    });
  </script>
</body>
</html>
