<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photography — Chris Jacobs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="../images/favicon2.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ── HERO BANNER ── */
    .photo-hero {
      position: relative;
      width: 100%;
      height: 70vh;
      min-height: 400px;
      overflow: hidden;
      background: var(--bg-3);
    }
    .hero-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .hero-slide.active { opacity: 1; }
    .hero-slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(0,0,0,0.7) 100%
      );
    }
    .hero-overlay {
      position: absolute;
      bottom: 40px;
      left: 80px;
      right: 80px;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .hero-caption {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.1em;
    }
    .hero-exif-strip {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      text-align: right;
    }
    .hero-dots {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 2;
    }
    .hero-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: background 0.3s;
      cursor: none;
    }
    .hero-dot.active { background: var(--accent); }

    /* ── NAV BAR ── */
    .photo-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 80px 0;
    }
    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-3);
      text-decoration: none;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 32px 80px 24px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-right: 8px;
    }
    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 5px 14px;
      border: 1px solid var(--border-mid);
      border-radius: 20px;
      color: var(--text-2);
      background: none;
      cursor: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      border-color: var(--accent);
      color: #000;
      background: var(--accent);
    }

    /* ── MASONRY GRID ── */
    .masonry-wrap {
      padding: 0 80px 80px;
    }
    .masonry-grid {
      columns: 3;
      column-gap: 16px;
    }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: none;
    }
    .masonry-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
      border-radius: 4px;
    }
    .masonry-item:hover img { transform: scale(1.03); }
    .masonry-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
    }
    .masonry-item:hover .masonry-overlay { opacity: 1; }
    .masonry-caption {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #fff;
      margin-bottom: 4px;
    }
    .masonry-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.06em;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 80px;
      text-align: center;
    }
    .empty-state .mono {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: block;
    }
    .empty-state p {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.7;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }
    .lightbox-inner {
      display: flex;
      gap: 40px;
      align-items: center;
      max-width: 90vw;
      max-height: 90vh;
    }
    .lightbox-img-wrap {
      flex: 1;
      max-height: 85vh;
      display: flex;
      align-items: center;
    }
    .lightbox-img-wrap img {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
    }
    .lightbox-info {
      width: 240px;
      flex-shrink: 0;
    }
    .lightbox-caption {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .lightbox-category {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .exif-table { width: 100%; }
    .exif-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .exif-row:last-child { border-bottom: none; }
    .exif-key {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .exif-val {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.04em;
      text-align: right;
    }
    .lightbox-close {
      position: fixed;
      top: 24px; right: 32px;
      font-size: 24px;
      color: rgba(255,255,255,0.5);
      background: none;
      border: none;
      cursor: none;
      transition: color 0.2s;
      z-index: 201;
      line-height: 1;
    }
    .lightbox-close:hover { color: #fff; }
    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 32px;
      cursor: none;
      transition: color 0.2s;
      z-index: 201;
      padding: 16px;
    }
    .lightbox-nav:hover { color: #fff; }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    /* ── PLACEHOLDER TILES ── */
    .placeholder-tile {
      width: 100%;
      background: var(--bg-3);
      border: 1px dashed var(--border-mid);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.08em;
    }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      .photo-nav { padding: 24px; }
      .filter-bar { padding: 24px 24px 16px; }
      .masonry-wrap { padding: 0 24px 48px; }
      .masonry-grid { columns: 2; }
      .hero-overlay { left: 24px; right: 24px; bottom: 24px; }
      .lightbox-inner { flex-direction: column; max-width: 95vw; }
      .lightbox-info { width: 100%; }
    }
    @media (max-width: 480px) {
      .masonry-grid { columns: 1; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Auth guard -->
  <script>window.CJ_SECTION = 'photo';</script>
  <script src="../js/auth-guard.js"></script>

  <!-- Hero Banner -->
  <div class="photo-hero" id="photoHero">
    <!-- Slides injected by JS -->
    <div class="hero-overlay">
      <div>
        <div class="hero-caption" id="heroCaption">—</div>
      </div>
      <div class="hero-exif-strip" id="heroExif"></div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </div>

  <!-- Page nav -->
  <div class="photo-nav">
    <a href="../index.html" class="back-link">← Home</a>
    <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-3);letter-spacing:0.1em;">
      PHOTOGRAPHY
    </span>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Filter</span>
  </div>

  <!-- Masonry grid -->
  <div class="masonry-wrap">
    <div class="masonry-grid" id="masonryGrid"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev">‹</button>
    <button class="lightbox-nav lightbox-next" id="lbNext">›</button>
    <div class="lightbox-inner">
      <div class="lightbox-img-wrap">
        <img src="" alt="" id="lbImg">
      </div>
      <div class="lightbox-info">
        <div class="lightbox-caption" id="lbCaption"></div>
        <div class="lightbox-category" id="lbCategory"></div>
        <div class="exif-table" id="lbExif"></div>
      </div>
    </div>
  </div>

  <script>
    // ── CURSOR ──
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = -100, my = -100, rx = -100, ry = -100;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function animCursor() {
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
      rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animCursor);
    })();

    // ── THEME ──
    const savedTheme = localStorage.getItem('cj-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    // ── LOAD PHOTOS ──
    let allPhotos = [];
    let filteredPhotos = [];
    let currentLbIndex = 0;
    let activeFilter = 'all';

    // Seed RNG from session start time so hero order is consistent per session
    // but randomized between sessions
    const SESSION_SEED = Math.floor(Date.now() / (1000 * 60 * 30)); // changes every 30min
    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }
    function shuffleSeeded(arr, seed) {
      const rng = seededRandom(seed);
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    fetch('../data/photos.json')
      .then(r => r.json())
      .then(data => {
        allPhotos = data.photos;
        buildFilters(data.categories);
        renderGrid('all');
        buildHero();
      })
      .catch(() => {
        // No photos yet — show empty state
        document.getElementById('masonryGrid').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <span class="mono">No photos yet</span>
            <p>Add photos to <code>images/photos/</code> and entries to <code>data/photos.json</code> to populate this gallery.</p>
          </div>`;
      });

    // ── HERO BANNER ──
    function buildHero() {
      const featured = allPhotos.filter(p => p.featured);
      if (!featured.length) return;
      const shuffled = shuffleSeeded(featured, SESSION_SEED);
      const hero = document.getElementById('photoHero');
      const dots = document.getElementById('heroDots');

      shuffled.forEach((photo, i) => {
        const slide = document.createElement('div');
        slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
        slide.style.backgroundImage = `url('../images/photos/${photo.filename}')`;
        hero.insertBefore(slide, hero.querySelector('.hero-overlay'));

        const dot = document.createElement('div');
        dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToSlide(i));
        dots.appendChild(dot);
      });

      updateHeroInfo(shuffled[0]);

      let current = 0;
      function goToSlide(n) {
        document.querySelectorAll('.hero-slide')[current].classList.remove('active');
        document.querySelectorAll('.hero-dot')[current].classList.remove('active');
        current = n;
        document.querySelectorAll('.hero-slide')[current].classList.add('active');
        document.querySelectorAll('.hero-dot')[current].classList.add('active');
        updateHeroInfo(shuffled[current]);
      }

      // Auto-advance every 5s
      setInterval(() => {
        goToSlide((current + 1) % shuffled.length);
      }, 5000);
    }

    function updateHeroInfo(photo) {
      document.getElementById('heroCaption').textContent = photo.caption || '';
      const exif = photo.exif;
      if (exif) {
        const parts = [exif.camera, exif.lens, exif.aperture, exif.shutter, exif.iso ? `ISO ${exif.iso}` : '', exif.film].filter(Boolean);
        document.getElementById('heroExif').textContent = parts.join(' · ');
      }
    }

    // ── FILTERS ──
    function buildFilters(categories) {
      const bar = document.getElementById('filterBar');
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = cat;
          renderGrid(cat);
        });
        bar.appendChild(btn);
      });
    }

    // ── MASONRY GRID ──
    function renderGrid(filter) {
      const grid = document.getElementById('masonryGrid');
      grid.innerHTML = '';
      filteredPhotos = filter === 'all'
        ? allPhotos
        : allPhotos.filter(p => p.category === filter);

      if (!filteredPhotos.length) {
        grid.innerHTML = `<div class="empty-state"><span class="mono">No photos in this category yet</span></div>`;
        return;
      }

      filteredPhotos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'masonry-item';
        item.innerHTML = `
          <img
            src="../images/photos/${photo.filename}"
            alt="${photo.caption || ''}"
            loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=\\'placeholder-tile\\' style=\\'aspect-ratio:${photo.width}/${photo.height};\\'>[ ${photo.filename} ]</div>'"
          >
          <div class="masonry-overlay">
            <div class="masonry-caption">${photo.caption || ''}</div>
            <div class="masonry-meta">${photo.category} · ${photo.date}</div>
          </div>`;
        item.addEventListener('click', () => openLightbox(i));
        grid.appendChild(item);
      });
    }

    // ── LIGHTBOX ──
    function openLightbox(index) {
      currentLbIndex = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      const photo = filteredPhotos[currentLbIndex];
      document.getElementById('lbImg').src = `../images/photos/${photo.filename}`;
      document.getElementById('lbImg').alt = photo.caption || '';
      document.getElementById('lbCaption').textContent = photo.caption || '';
      document.getElementById('lbCategory').textContent = photo.category;

      const exif = photo.exif || {};
      const exifRows = [
        ['Camera', exif.camera],
        ['Lens', exif.lens],
        ['Aperture', exif.aperture],
        ['Shutter', exif.shutter],
        ['ISO', exif.iso],
        ['Film', exif.film]
      ].filter(([,v]) => v);

      document.getElementById('lbExif').innerHTML = exifRows
        .map(([k,v]) => `<div class="exif-row"><span class="exif-key">${k}</span><span class="exif-val">${v}</span></div>`)
        .join('');
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => {
      currentLbIndex = (currentLbIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
      updateLightbox();
    });
    document.getElementById('lbNext').addEventListener('click', () => {
      currentLbIndex = (currentLbIndex + 1) % filteredPhotos.length;
      updateLightbox();
    });
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { currentLbIndex = (currentLbIndex - 1 + filteredPhotos.length) % filteredPhotos.length; updateLightbox(); }
      if (e.key === 'ArrowRight') { currentLbIndex = (currentLbIndex + 1) % filteredPhotos.length; updateLightbox(); }
    });
  </script>
</body>
</html>
